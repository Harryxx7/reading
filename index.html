<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考研英语阅读技巧手记</title>
  <style>
    :root {
      --bg: #faf7ef;
      --surface: #fffdf8;
      --surface-soft: #f1eadc;
      --surface-strong: #e6dcc8;
      --ink: #28231d;
      --ink-soft: #625b50;
      --ink-muted: #918879;
      --line: #ded4c1;
      --line-strong: #c7b89d;
      --accent: #b85c38;
      --accent-2: #2f6670;
      --accent-3: #6c7f43;
      --mark: #fff0a6;
      --shadow: 0 18px 45px rgba(62, 47, 27, 0.08), 0 2px 8px rgba(62, 47, 27, 0.05);
      --topbar: 64px;
      --sidebar: 300px;
      --rail: 290px;
      --radius: 8px;
      --speed: 180ms ease;
    }

    [data-theme="dark"] {
      --bg: #17130f;
      --surface: #211c16;
      --surface-soft: #2a231b;
      --surface-strong: #352c21;
      --ink: #eee5d6;
      --ink-soft: #c0b6a6;
      --ink-muted: #8f8576;
      --line: #382f25;
      --line-strong: #544838;
      --accent: #ee9868;
      --accent-2: #7bb7bd;
      --accent-3: #b2c47c;
      --mark: #5a4917;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.35), 0 2px 10px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    body {
      height: 100vh;
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .topbar {
      height: var(--topbar);
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(18px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 22px;
      position: relative;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 260px;
      gap: 12px;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border: 2px solid var(--accent);
      display: grid;
      place-items: center;
      color: var(--accent);
      flex: 0 0 auto;
    }

    .brand-mark::before {
      content: "";
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
    }

    .brand-title {
      font-size: 17px;
      font-weight: 750;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink-soft);
      padding: 8px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06);
      transition: transform var(--speed), background var(--speed), color var(--speed), border-color var(--speed);
    }

    .btn:hover {
      transform: translateY(-1px);
      color: var(--ink);
      border-color: var(--line-strong);
      background: var(--surface-soft);
    }

    .btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn.icon-only {
      width: 40px;
      padding: 0;
      border-radius: 50%;
    }

    .app {
      height: calc(100vh - var(--topbar));
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr) var(--rail);
      min-height: 0;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 92%, var(--surface));
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-head {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-title {
      margin: 0;
      font-size: 13px;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .count-pill,
    .tag {
      border-radius: 999px;
      background: var(--surface-strong);
      color: var(--ink-soft);
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .search-wrap {
      padding: 14px 14px 6px;
    }

    .search-input {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      border-radius: var(--radius);
      padding: 10px 12px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .nav-list {
      list-style: none;
      padding: 8px 10px 18px;
      margin: 0;
      overflow: auto;
      min-height: 0;
    }

    .nav-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--ink-soft);
      text-align: left;
      border-radius: var(--radius);
      padding: 11px 12px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      transition: background var(--speed), color var(--speed);
    }

    .nav-item:hover {
      background: var(--surface-soft);
      color: var(--ink);
    }

    .nav-item.active {
      background: var(--surface-strong);
      color: var(--ink);
      font-weight: 750;
    }

    .nav-num {
      color: var(--accent);
      font-weight: 850;
      font-size: 13px;
      padding-top: 1px;
    }

    .nav-text {
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.45;
    }

    .main {
      min-width: 0;
      min-height: 0;
      background: var(--bg);
      overflow: hidden;
    }

    .focus-view,
    .flow-view {
      height: 100%;
      min-height: 0;
    }

    .focus-view {
      padding: 22px;
      display: flex;
    }

    .lesson-card {
      width: 100%;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .lesson-head {
      border-bottom: 1px solid var(--line);
      padding: 20px 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      background: color-mix(in srgb, var(--surface-soft) 42%, var(--surface));
    }

    .lesson-kicker {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .lesson-title {
      margin: 0;
      font-size: clamp(22px, 2.3vw, 34px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .lesson-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .section-strip {
      border-bottom: 1px solid var(--line);
      padding: 12px 18px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      background: var(--surface);
    }

    .section-chip {
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink-soft);
      border-radius: 999px;
      padding: 7px 11px;
      white-space: nowrap;
      cursor: pointer;
      font-size: 13px;
    }

    .section-chip:hover,
    .section-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, var(--surface));
    }

    .lesson-body {
      min-height: 0;
      overflow: auto;
      padding: 24px;
      scroll-behavior: smooth;
    }

    .lesson-footer {
      border-top: 1px solid var(--line);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--surface);
    }

    .progress-text {
      color: var(--ink-muted);
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .flow-view {
      overflow: auto;
      padding: 34px 26px 60px;
      scroll-behavior: smooth;
    }

    .flow-shell {
      max-width: 980px;
      margin: 0 auto;
    }

    .flow-title {
      border-bottom: 1px solid var(--line-strong);
      padding-bottom: 22px;
      margin-bottom: 26px;
    }

    .flow-title h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: 0;
    }

    .flow-title p {
      margin: 0;
      color: var(--ink-soft);
      line-height: 1.8;
    }

    .flow-section {
      padding: 28px 0;
      border-bottom: 1px solid var(--line);
      scroll-margin-top: 18px;
    }

    .flow-section h2 {
      margin-top: 0;
    }

    .reader-rail {
      border-left: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 90%, var(--surface));
      padding: 18px;
      overflow: auto;
      min-height: 0;
    }

    .rail-block {
      margin-bottom: 22px;
    }

    .rail-title {
      margin: 0 0 12px;
      color: var(--ink-muted);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .quick-grid {
      display: grid;
      gap: 8px;
    }

    .quick-card {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 11px 12px;
      line-height: 1.55;
      color: var(--ink-soft);
      font-size: 14px;
    }

    .quick-card strong {
      color: var(--ink);
    }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px;
    }

    .stat b {
      display: block;
      color: var(--accent);
      font-size: 22px;
      line-height: 1;
      margin-bottom: 5px;
    }

    .stat span {
      color: var(--ink-muted);
      font-size: 12px;
    }

    .markdown {
      font-size: 16px;
      line-height: 1.85;
      color: var(--ink-soft);
    }

    .markdown h2,
    .markdown h3,
    .markdown h4 {
      color: var(--ink);
      line-height: 1.35;
      letter-spacing: 0;
    }

    .markdown h2 {
      font-size: 28px;
      margin: 0 0 18px;
    }

    .markdown h3 {
      font-size: 21px;
      margin: 30px 0 12px;
      padding-left: 12px;
      border-left: 4px solid var(--accent);
    }

    .markdown h4 {
      font-size: 17px;
      margin: 22px 0 8px;
      color: var(--accent-2);
    }

    .markdown p {
      margin: 10px 0;
    }

    .markdown ul,
    .markdown ol {
      padding-left: 1.35em;
      margin: 10px 0 18px;
    }

    .markdown li {
      margin: 6px 0;
    }

    .markdown strong {
      color: var(--ink);
      font-weight: 850;
    }

    .markdown em {
      color: var(--accent-2);
      font-style: italic;
    }

    .markdown code {
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 1px 5px;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }

    .markdown blockquote {
      margin: 16px 0;
      padding: 14px 18px;
      border-left: 4px solid var(--accent-3);
      background: color-mix(in srgb, var(--accent-3) 10%, var(--surface));
      color: var(--ink-soft);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .markdown table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 22px;
      border: 1px solid var(--line);
      background: var(--surface);
      font-size: 15px;
    }

    .markdown th,
    .markdown td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      vertical-align: top;
      text-align: left;
    }

    .markdown th {
      color: var(--ink);
      background: var(--surface-soft);
      font-weight: 850;
    }

    .markdown tr:nth-child(even) td {
      background: color-mix(in srgb, var(--surface-soft) 35%, transparent);
    }

    .empty {
      padding: 40px;
      text-align: center;
      color: var(--ink-muted);
    }

    .hidden {
      display: none !important;
    }

    .test-mode .markdown {
      filter: blur(10px);
      opacity: 0.2;
      transition: filter var(--speed), opacity var(--speed);
    }

    .test-mode .markdown:hover,
    .test-mode .markdown.reveal {
      filter: blur(0);
      opacity: 1;
    }

    .uploader {
      position: fixed;
      inset: 0;
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: blur(12px);
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .uploader.active {
      display: flex;
    }

    .upload-box {
      width: min(560px, 100%);
      background: var(--surface);
      border: 1px dashed var(--line-strong);
      border-radius: 18px;
      padding: 34px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .upload-box h2 {
      margin: 0 0 10px;
    }

    .upload-box p {
      margin: 0 0 20px;
      color: var(--ink-soft);
      line-height: 1.7;
    }

    .upload-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 1180px) {
      body {
        height: auto;
        overflow: auto;
      }

      .topbar {
        height: auto;
        min-height: var(--topbar);
        position: sticky;
        top: 0;
        flex-direction: column;
        align-items: stretch;
        padding: 12px;
      }

      .brand {
        min-width: 0;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .app {
        height: auto;
        display: block;
      }

      .sidebar,
      .reader-rail {
        border: 0;
      }

      .sidebar {
        max-height: 280px;
        border-bottom: 1px solid var(--line);
      }

      .reader-rail {
        display: none;
      }

      .main {
        overflow: visible;
      }

      .focus-view,
      .flow-view {
        height: auto;
      }

      .focus-view {
        padding: 12px;
      }

      .lesson-card {
        display: block;
      }

      .lesson-body {
        overflow: visible;
      }

      .lesson-head,
      .lesson-footer {
        flex-direction: column;
        align-items: stretch;
      }
    }

    @media print {
      body {
        height: auto !important;
        overflow: visible !important;
        background: #fff !important;
        color: #000 !important;
      }

      .topbar,
      .sidebar,
      .reader-rail,
      .lesson-footer,
      .section-strip,
      .uploader {
        display: none !important;
      }

      .app,
      .main,
      .flow-view {
        display: block !important;
        height: auto !important;
        overflow: visible !important;
      }

      .focus-view {
        display: none !important;
      }

      .flow-view,
      .flow-shell {
        padding: 0 !important;
        max-width: none !important;
      }

      .flow-section {
        page-break-before: always;
      }

      .flow-section:first-of-type {
        page-break-before: avoid;
      }

      .markdown,
      .markdown * {
        color: #000 !important;
        filter: none !important;
        opacity: 1 !important;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div>
        <div class="brand-title">考研英语阅读技巧手记</div>
      </div>
    </div>
    <div class="toolbar" aria-label="页面工具">
      <button class="btn active" id="focusModeBtn" type="button">章节精读</button>
      <button class="btn" id="flowModeBtn" type="button">长卷模式</button>
      <button class="btn" id="testModeBtn" type="button">自测遮罩</button>
      <button class="btn" id="printBtn" type="button">打印/PDF</button>
      <button class="btn" id="importBtn" type="button">导入笔记</button>
      <button class="btn icon-only" id="themeBtn" type="button" aria-label="切换亮暗色">☾</button>
    </div>
  </header>

  <div class="app">
    <aside class="sidebar">
      <div class="panel-head">
        <h2 class="panel-title">目录导航</h2>
        <span class="count-pill" id="chapterCount">0 章</span>
      </div>
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="search" placeholder="搜索技巧、题型、信号词">
      </div>
      <ul class="nav-list" id="navList"></ul>
    </aside>

    <main class="main">
      <section class="focus-view" id="focusView">
        <article class="lesson-card">
          <div class="lesson-head">
            <div>
              <p class="lesson-kicker" id="lessonKicker">Reading Notes</p>
              <h1 class="lesson-title" id="lessonTitle">加载中</h1>
            </div>
            <div class="lesson-meta" id="lessonMeta"></div>
          </div>
          <div class="section-strip" id="sectionStrip"></div>
          <div class="lesson-body markdown" id="lessonBody"></div>
          <div class="lesson-footer">
            <button class="btn" id="prevBtn" type="button">上一章</button>
            <div class="progress-text" id="progressText">键盘 ← / → 可切换章节</div>
            <button class="btn" id="nextBtn" type="button">下一章</button>
          </div>
        </article>
      </section>

      <section class="flow-view hidden" id="flowView">
        <div class="flow-shell">
          <div class="flow-title">
            <h1 id="flowTitle">考研英语阅读技巧手记</h1>
            <p id="flowDesc">按“做题动作 → 信号识别 → 答案判断 → 干扰排除”的顺序整理，适合整篇复盘和打印。</p>
          </div>
          <div class="markdown" id="flowContent"></div>
        </div>
      </section>
    </main>

    <aside class="reader-rail">
      <div class="rail-block">
        <h2 class="rail-title">速查重点</h2>
        <div class="quick-grid" id="quickList"></div>
      </div>
      <div class="rail-block">
        <h2 class="rail-title">笔记概览</h2>
        <div class="stat-row">
          <div class="stat"><b id="statChapters">0</b><span>章节</span></div>
          <div class="stat"><b id="statSections">0</b><span>小节</span></div>
        </div>
      </div>
    </aside>
  </div>

  <div class="uploader" id="uploader">
    <div class="upload-box" id="dropZone">
      <h2>导入 Markdown 笔记</h2>
      <p>选择或拖入新的阅读笔记。页面会按二级标题自动生成目录，并重新渲染为技巧手记。</p>
      <div class="upload-actions">
        <button class="btn active" id="chooseFileBtn" type="button">选择 .md 文件</button>
        <button class="btn" id="closeUploadBtn" type="button">取消</button>
      </div>
      <input class="file-input" id="fileInput" type="file" accept=".md,text/markdown,text/plain">
    </div>
  </div>

  <script type="text/markdown" id="embeddedMarkdown"># 英语阅读笔记（考研）

---

## 一、拿到文章的基本策略

### 先读题后读文，只看题干

#### 1. 定位词
- 大写、人名、地名、时间、年代、数字
- 名词、形容词

#### 2. 串联题干间逻辑，推测文章主题

---

## 二、关键信号词

### 转折词 → 后面是重点

| 信号词 | 说明 |
|--------|------|
| but / however | 常规转折 |
| **now** | 相当于 but/however，**now 之后是重点**，经真题反复验证 |
| **yielded to / give way to** | "A yielded to B" = A 让位于 B，**B 才是当前状态**；同类：be replaced by、turn into |

> 示例（1997真题第52题）：
> 题干问"美国1980s经济衰退的表现"，原文用 **Now** 引出转折——
> "By 1987 there was only one American television maker left, Zenith. **Now** there is none..."
> → now 后才是答案所在句

---

### 时间信号 → 时间相反，一切相反

**规律：**
- 题干出现某一时间点 → 答案往往在原文**与之对立的时间**附近
- 原文常用时间对比构造转折，题目考的是转折后的结论
- 口诀：**时间变了，结论/状态也跟着反转**

> 示例：题干锁定"1980s（过去）"，原文"By 1987（过去）→ **Now**（现在）"构成对比
> → 答案在 Now 之后，即现在时态的句子里

---

### "Few + 大众观点" = 作者真正支持的才是答案

**规律：**
- "Few Americans think X" → 大多数人不认为X → **但作者认为X才是对的**
- 本质是"作者与大众对立"结构：大众盲目自信，少数清醒者（作者）看到真相
- 不要被"否定"表面迷惑——Few否定的是大众，不是作者观点

**示例（2000年真题第54题，Text 1）：**

**原文背景：** 文章写于1995年，讲的是美国经济在经历1980s的衰退后，1990s强势复苏，日本反而陷入困境。大量美国专家、学者开始高调赞美本国的工业结构、企业管理、生产效率——作者认为这是一种"盲目自信"，真正的复苏原因（经济周期的自然转折）反而被大众忽视。
- 题干：作者认为1990s美国经济复苏归因于什么？
- 原文：*Few Americans attribute this solely to such obvious causes as a devalued dollar or **the turning of the business cycle.***
- → 大众不承认经济周期是原因 → 作者恰恰认为这才是真正原因
- → 答案：**A（turning of the business cycle）**

**文章整体逻辑：**
- Self-doubt has **yielded to** blind pride（自我怀疑让位于盲目自信）
- 后文大量举例：各路专家、学者盛赞美国工业/管理 → 这些都是"盲目自信"的体现
- 作者立场：这些人沉浸在自我感觉良好中，真正的原因（经济周期）反而被忽视

---

## 三、正确答案的三个特征

### 1. 同义改写（含正话反说）
- 正确答案不会照抄原文，而是用**同义词/近义词**替换关键词
- 看到选项和原文用词完全一样反而要警惕

**正话反说** = 同义改写的特殊形式：原文用正面/迂回表达，答案用负面/直接表达（或反之），意思相同但角度相反

> 示例1（99-1 Q53，Text 1）：
> 原文（4段）：*Now the tide appears to be turning... some courts are beginning to **side with defendants***（法院开始站在被告一边）
> → 正话：法院支持被告
> → 反说：**[A] some injury claims were no longer supported by law** ✓（部分伤害索赔不再受法律支持）
> → 两种表达角度相反，意思完全相同

> 示例2（99-1 Q55）：
> 原文（1段）：*There are about 105 males born for every 100 females, but this ratio drops to near balance at the age of maturity, and among 70-year-olds there are **twice as many women as men***（男性大量死亡）
> → 正话：女性存活数量是男性两倍
> → 反说：**[C] A lower survival rate** ✓（男性存活率更低）

> 示例3（99-5 Q67）：
> 原文（1段）：*Science, in practice, depends **far less** on the experiments it prepares **than on** the preparedness of the minds of the men who watch the experiments.*
> → 原文说：科学实践**更少**依赖实验本身，**更多**依赖观察实验的人的思维准备度
> → 正话（原文角度）：实验不如思维重要
> → 反说（答案角度）：**[A] Inquiring minds are more important than scientific experiments** ✓
> → 两者意思相同，只是原文用"less...than"否定式，答案用"more important than"肯定式

### 2. 与中心思想密切相关
- 正确答案往往指向文章的核心观点，而不是细节
- 选项如果只是复述某个孤立细节，优先级低

### 3. 语气缓和：some / may / partly ⭐（出现概率约90%）
- 正确答案倾向于用**不确定、部分、可能**等缓和词
- 与干扰项第6条"绝对化用词"完全相反
- 见到含 some、may、partly、in some cases 的选项，优先考虑

---

## 四、干扰选项的七种特征

### 1. 正反混淆
- 原文说"effortless（轻松）"，选项改成"painstaking（费力）"——意思完全相反
- 识别方法：找到原文对应词，看选项是否把正面改成负面或反之

### 2. 概念偷换
- 原文说"比任何竞争对手大八倍（than any competitor）"，选项改成"比以前大八倍（than before）"——比较对象被偷换
- 数字/倍数题尤其要核查**比较基准**是什么

### 3. 答非所问
- 选项内容原文有，但回答的不是题目问的那个问题
- 定位对了，但没有看清题干问的是什么

### 4. 不同内容嫁接
- 把原文两个不相关的信息拼在一起，制造一个"看起来对"的选项

### 5. 非最佳答案
- 选项A、B都能在原文找到支撑，但B更直接、更准确
- A只是"没有B好"，不是完全错误，但考研选最优
- 示例：
  - [D] A long history of success may pave the way for further development.
  - **[B] Intense competition may contribute to economic progress** ← 更优，直接对应原文核心

### 6. 绝对化用词
- 选项出现 only、must、exclusively、never、all 等极端词 → 高度警惕
- 原文一般不会说得这么绝对，选项加了绝对词往往就错了

### 7. 就事论事（常见于例证题）
- 例子中出现的具体细节被直接放进选项 → 干扰项
- 正确答案应该是例子背后的**观点**，而不是例子本身的内容

### 8. 主被动偷换
- 干扰项常把原文的主动/被动关系换掉，导致动作发出者和承受者错位
- 做题时要问清楚：**是谁做了这个动作？谁被影响？谁被评价？**
- 原文是 A 对 B 做某事，选项可能改成 B 对 A 做某事
- 原文是某人**被认为/被评价**，选项可能改成某人**主动认为/主动评价**
- 只要主被动关系变了，即使关键词一样，也要警惕

---

## 五、专题：标点符号的运用

### 逗号（,）
**规律：** 两个逗号之间，或一个逗号之后，是补充说明成分，属于**非主干**

- 读句子找主干时，逗号夹住的部分可以先跳过
- 示例1（00-1 第2段）：
  - 原文：*...the making of semiconductors，which America had invented and which sat at the heart of the new computer age，was going to be the next casualty.*
  - → 两逗号之间是定语从句修饰语，主干是"the making of semiconductors was going to be the next casualty"
- 示例2（96-5 第1段）：
  - 原文：*"Scientific" creationism，which is being pushed by some for "equal time"...，is based on religion, not science.*
  - → 主干是"Scientific creationism is based on religion, not science"

---

### 冒号（:）
**规律：** 冒号前后，一般是从**抽象到具体**，冒号后面的内容解释前面的内容

- 定位答案时，冒号后的具体内容往往才是关键
- 示例1（97-3 第60题）：
  - 题干问"pervasive"是什么意思
  - 原文：*...the use of substances (drugs) is pervasive : an aspirin to quiet a headache, some wine to be sociable, coffee to get going in the morning...*
  - → 冒号后列举大量具体例子 → pervasive = widespread（答案A）
- 示例2（07-4 第36题）：
  - 原文：*...a new problem threatens...the executive suite : data insecurity.*
  - → 冒号后"data insecurity"是"新威胁"的具体所指 → 谚语用来引出D（the severity of data leakage）

---

### 分号（;）
**规律：** 分号前后为**并列关系**，两句地位平等、意思相近或互为补充

- 读不懂分号前的句子，看分号后——意思是一样的
- 示例1（03-4 第2段）：
  - *Death is normal ; we are genetically programmed to disintegrate and perish, even under ideal conditions.*
  - → 两句并列，都在说"死亡是自然的"
- 示例2（97-5 第3段，第69题）：
  - *This is no flash in the pan ; over the past couple of years, inflation has been consistently lower than expected.*
  - → 分号后解释了"no flash in the pan"的含义 = 低通胀持续了很长时间 → 答案A（the low inflation rate will last for some time）

---

### 引号（" "）
**规律：** 两种用法
1. **引用**：直接引用他人原话
2. **反语或语义转移**：作者加引号表示**不认同**该词的通常含义，带有讽刺或特殊含义

- 示例（96-5 第1段，第67题）：
  - 原文：*"Scientific" creationism is based on religion, not science.*
  - → "scientific"打引号 = 作者讽刺这个"科学"根本不科学，是语义转移
  - → 答案D（the deceptive theory about the origin of the universe）

**反面提醒：原文带引号，选项去掉引号直接用 = 干扰项**
- 引号是作者态度的标记，去掉引号等于去掉了作者的讽刺/保留态度，含义已经改变
- 示例（97-1 第53题）：
  - 原文：undergo a **"cooling off"** period of seven days（带引号，暗示这个说法是程序术语或有特定含义）
  - 选项D：undergo a cooling off period of seven days → 去掉引号直接用，含义变成字面意思，排除
  - 口诀：**原文有引号，选项去了引号 → 不选**

---

## 六、题型专题

> 本章持续补充，每种题型单独列一节。

### 例证题

**标志词：** example / case / illustrate / demonstrate / to show / **to + 动词原形** ⭐

> **"to ___" 特别重要**：凡是看到 "to illustrate / to demonstrate / to show / to prove / to explain..." 这类不定式，后面紧跟的就是**例子的目的**，目的句本身就是观点所在。

**核心规律：**
1. 例子本身不重要，重要的是例子**所支持的观点**
2. 观点一般在例子**前面**，有时也在例子后面
3. 答案要找观点句，不要纠缠例子细节

**干扰项特征：就事论事——谈例子本身，不谈例子支持的观点**（见第四章第7条）

> **示例1（1999真题 Text 1，第53题）**
>
> **文章背景（1段）：** 自1980年代起，陪审团开始判定公司对消费者的意外事故承担责任，于是公司纷纷撰写越来越长的警告标签来规避诉讼风险。
>
> **2段原文：** *Feeling threatened, companies responded by writing ever-longer warning labels...*
> - **"Feeling threatened"** = 分词短语作原因状语，意为**"因为感到受到威胁"**
> - 翻译：因为感到受到（诉讼）威胁，公司的应对方式是撰写越来越长的警告标签
>
> **4段原文：** ***Now** the tide appears to be turning. As personal injury claims continue as before, some courts are beginning to side with defendants... In May, Julie Nimmons... successfully fought a lawsuit involving a football player who was paralyzed in a game while wearing a **Schutt helmet**.*
> - **Now** = 转折信号，后面是重点：法院开始偏向被告，诉讼形势正在逆转
> - Schutt 头盔案例 = **例子**，用来支撑"tide is turning"这个观点
>
> **题目：** The case of Schutt helmet demonstrated that
> - [A] some injury claims were no longer supported by law ✓ **（正确 · 正话反说）**
> - [B] helmets were not designed to prevent injuries ✗ **← 就事论事干扰项**
> - [C] product labels would eventually be discarded ✗
> - [D] some sports games might lose popularity with athletes ✗
>
> **解析：**
> - **B 为什么排除**：题干问的是"Schutt 头盔这个案例说明了什么"，B 说的是"头盔本身不是用来防止受伤的"——这是在谈**例子中的物品（头盔）本身**，属于就事论事。案例的意义在于它代表了法律风向的转变，而不是头盔的设计用途。
> - **A 为什么正确**：原文说法院开始站在被告一边（正话），A 说"部分伤害索赔不再受法律支持"（反说）——角度相反，含义相同，是典型的**正话反说式同义改写**。

---

> **示例2（2018真题 Text 2，第39题）**
>
> 原文（08-4段）：*"...the South could not afford to part with its slaves. Owning slaves was 'like having a large bank account'... The southern states would not have signed the Constitution without protections for the 'peculiar institution,' including a clause that counted a slave as three fifths of a man for purposes of congressional representation."*
>
> 题目：Which of the following is true according to the text?
> - [A] Some Founding Fathers benefit politically from slavery. ✓ **（正确）**
> - [B] Slaves in the old days did not have the right to vote. ✗
> - [C] Slave owners usually had large **savings** accounts. ✗ **← 就事论事干扰项**
> - [D] Slavery was regarded as a peculiar institution. ✗
>
> **解析：**
> - C 错误：原文"like having a large bank account"是**比喻**（例子），意思是拥有奴隶像拥有大额存款一样（是财富），并不是说奴隶主真的有大额储蓄账户。选C就是犯了"就事论事"的错误——把比喻当事实。
> - A 正确：原文提到奴隶按3/5的人头算国会代表席位 → 南方州借此多得议席 → 国父们从奴隶制中获得了政治利益，是例子背后的**观点**。

---

### 例证题补充：例子本身不是答案，例子服务于观点

**核心动作：**
- 看到题干出现 example / case / mentioned / prove / justify / imply / conclusion，要先判断它是不是例证题
- 例证题不要盯着例子本身选，要回到例子前后的观点句
- 如果选项只复述例子中的具体对象、具体事件、具体词汇，往往是"就事论事"干扰项

---

#### 示例3：Newton 苹果例子（99-5 Text 5 第67题）

**题干：** The author wants to prove with the example of Isaac Newton that ____.

**原文关键句：**
> Science, in practice, depends far less on the experiments it prepares than on the preparedness of the minds of the men who watch the experiments.  
> Sir Isaac Newton supposedly discovered gravity through the fall of an apple.

**判断：**
- Newton 苹果不是重点，重点在例子前面的观点句
- 原文说科学实践更少依赖实验本身，更多依赖观察者的头脑准备
- 所以答案不是"苹果/实验/偶然发现"，而是"有准备的头脑更重要"

**答案：**
- [A] inquiring minds are more important than scientific experiments ✓

**方法总结：**
- 例子紧跟在观点句后面时，例子只是证明观点
- 答案要回到观点句做同义改写

---

#### 示例4：美国基础设施案例（01-2 第57题）

**题干：** The writer mentioned the case of the United States to justify the policy of ____.

**原文关键句：**
> To take advantage of this tool, some impoverished countries will have to get over their outdated anti-colonial prejudices with respect to foreign investment.  
> Countries that still think foreign investment is an invasion of their sovereignty might well study the history of infrastructure ... in the United States.

**判断：**
- "the case of the United States" 是例子
- 例子前的观点是：贫穷国家要克服对 foreign investment 的反殖民偏见
- 美国案例用来证明：接受外资有助于建设基础设施/发展

**答案方向：**
- 支持 accepting foreign investment
- 排除只谈美国基础设施本身的选项，因为那是在谈例子，不是在谈政策观点

**方法总结：**
- mentioned the case of X to justify... = 用 X 这个例子来证明前面的政策/观点
- 先找例子前一句，通常就是答案区

---

#### 示例5：ambition 文章中的 case（第68题）

**题干：** The last sentence of the first paragraph most probably implies that it is ____.

**原文关键句：**
> What is odd is that they have perhaps most benefited from ambition...  
> There is a heavy note of hypocrisy in this case of closing the barn door after the horses have escaped — with the educated themselves riding on them.

**判断：**
- "hypocrisy" 是明确负面评价
- 受过教育的人自己已经从 ambition 中受益，却声称放弃 ambition，这是一种虚伪
- closing the barn door after the horses have escaped 表示事情已经发生后再假装拒绝，带讽刺意味

**答案：**
- [C] dishonest to deny ambition after the fulfillment of the goal ✓

**方法总结：**
- 情感色彩要保持一致：原文是负面评价，答案也应是负面评价
- hypocrisy ≈ dishonest，是同义改写

---

### 题干陷阱：should 表示作者认为"应该怎样"

**规律：**
- 题干出现 should be maintained / should be avoided / should not... 时，要格外注意逻辑方向
- should 常常不是简单问"事实是什么"，而是在问"作者认为应该怎样"
- 如果题干带否定、反问或结论题，要先判断作者态度，再选符合态度的表达

**示例：ambition 文章第70题**

**题干：**
> From the last paragraph the conclusion can be drawn that ambition should be maintained ____.

**选项：**
- [A] secretly and vigorously
- [B] openly and enthusiastically ✓
- [C] easily and momentarily
- [D] verbally and spiritually

**判断：**
- 文章批评人们不敢公开承认 ambition
- 作者认为 ambition 不应该被虚伪地否认
- 所以 ambition 应该被 openly and enthusiastically maintained

**方法总结：**
- 题干问 conclusion，要回到全文态度
- 作者批评"不公开承认"，答案往往就是其反面：公开、积极地承认

---

### 例证题强化：例子不重要，例子服务于观点

**标志词：**
- example
- case
- illustrate
- demonstrate
- to show
- mentioned
- prove
- justify

**核心规律：**
1. 例子本身不重要，重要的是例子所支持的观点
2. 观点一般在例子前面，也可能在例子后面
3. 题干问"作者举这个例子为了说明什么"，不要选例子里的具体细节
4. 如果选项只复述例子中的人物、事件、物品，通常是"就事论事"干扰项

**找观点的几个信号：**
- 情态动词常表示观点：should / may / might / can
- 系动词常表达逻辑关系：be / become / remain / seem
- 反复强调的是重点
- 显性注释、括号解释、破折号解释常是考点
- but / however 后面通常是作者真正想强调的方向
- 形容词常体现作者评价和情感态度

---

#### 示例6：Stephen Cooper 与 animal research

**题干：**
> From the text we learn that Stephen Cooper is ____.

**原文关键句：**
> Finally, because the ultimate stakeholders are patients, the health research community should actively recruit to its cause not only well-known personalities such as Stephen Cooper, who has made courageous statements about the value of animal research...

**判断：**
- `courageous statements` 是明显的正面评价
- `about the value of animal research` 表明 Stephen Cooper 支持动物研究的价值
- 题干问 Stephen Cooper 是什么人，不要只看人物身份，要看作者给他的行为和态度评价

**答案：**
- [D] a supporter of animal research ✓

**方法总结：**
- 形容词表示评价：courageous = 作者认可
- `statements about the value of animal research` = 支持 animal research
- 人物例子通常服务于作者观点，不要只按人物身份猜

---

#### 示例7：alphabetism 是被忽视的不公平

**原文关键句：**
> Over the past century, all kinds of unfairness and discrimination have been condemned or made illegal. But one insidious form continues to thrive: alphabetism.

**题干：**
> What does the author intend to illustrate with AAAA and Zysman?

**判断：**
- `But` 后面是重点
- 前文反复出现 `unfairness / discrimination`
- `insidious` 表示"隐蔽的、潜伏的、有害的"
- alphabetism 被归入 unfairness / discrimination，但它不像其他歧视那样明显，所以是"被忽视的不平等"

**答案方向：**
- a kind of overlooked inequality ✓

**方法总结：**
- 反复强调的词是中心：unfairness / discrimination
- but 后面给出真正考点：alphabetism
- 形容词 `insidious` 提示它不是普通不公平，而是隐蔽、容易被忽视的不公平

---

#### 示例8：insidious / unaware 指向"难以察觉"

**原文关键句：**
> But one insidious form continues to thrive: alphabetism.  
> ... those at the early end of the alphabet gain the advantage of attention, while those whose surnames begin with a letter in the lower half of the alphabet are often ignored.

**题干：**
> What can we infer from the first three paragraphs?

**判断：**
- `insidious` = 隐蔽的、不易察觉的
- `unaware` / ignored 说明这种歧视常常不是公开承认的，而是潜在发生的
- 所以答案要体现"这种歧视太隐蔽，以至于难以识别"

**答案：**
- [D] Some form of discrimination is too subtle to recognize. ✓

**方法总结：**
- 形容词和评价词是态度入口
- `insidious` 不只是负面，还强调"隐蔽"
- infer 题常要求把原文评价词换成更抽象的表达

---

#### 示例9：alphabetism 的正确推断边界

**题干：**
> Which of the following is true according to the text?

**原文逻辑：**
- 过去一个世纪，很多 unfairness / discrimination 已经被谴责或立法禁止
- But alphabetism continues to thrive
- 姓氏靠后的学生仍然更容易被忽视，获得更少关注

**判断：**
- `continues to thrive` 说明 alphabetism 仍然存在
- 但原文没有说要发起或推进一场消除 alphabetism 的行动
- [C] Campaign to eliminate alphabetism still has a long way to go 是迷惑项：它站在"消除歧视"角度进一步推演，超出了原文
- true according to the text 题不能把"问题仍存在"自动推成"消除问题的运动还任重道远"

**答案：**
- [D] Putting things alphabetically may lead to unintentional bias. ✓

**方法总结：**
- `continues to thrive` = 问题仍然存在，不等于文中提出了消除运动
- 选项如果加入原文没有的行动、倡议、运动，要警惕过度推断
- 正确答案更贴近文章主线：按字母顺序排列可能导致无意的偏见

---

#### 示例10：后排学生与教师关注

**原文关键句：**
> So short-sighted Zysman junior gets stuck in the back row, and is rarely asked the improving questions posed by those insensitive teachers.  
> ... they get less individual attention, as well as less confidence in speaking publicly.

**题干：**
> The 4th paragraph suggests that ____.

**判断：**
- 后排学生被忽视，得到更少的 individual attention
- 结果是成绩和公开表达信心都受影响
- 这段不是单纯说"座位问题"，而是在说老师应该关注所有学生，不能让字母顺序造成隐性不公平

**答案方向：**
- teachers should pay attention to all of their students ✓

**方法总结：**
- suggest 题要读出作者态度和段落中心
- `less individual attention` 是问题所在
- 答案要上升到观点：教师应公平关注所有学生

---

## 七、句子结构与特殊表达

### 分词短语表原因

**规律：** 句首的现在分词短语（V-ing ...）常作**原因状语**，相当于 "Because / Since ..."

| 原文形式 | 翻译理解 |
|----------|----------|
| **Feeling threatened**, companies responded by... | **因为感到受到威胁**，公司的应对方式是…… |
| Seeing the results, she changed her mind. | 因为看到了结果，她改变了主意 |

**考试意义：**
- 读长句时，句首 V-ing 短语 = 原因/条件/时间背景，先理解它的逻辑关系，再看主句
- 常考点：分词短语的逻辑主语必须与主句主语一致（否则是悬垂分词，但真题中一般不会出这种错误）

---

### 长难句分析示例

**原句（99-5 Text 5，第1段）：**

> *Science, **in practice**, depends **far less** on the experiments it prepares **than on** the preparedness of the minds of the men **who watch the experiments**.*

**句子拆解：**

| 成分 | 原文片段 | 说明 |
|------|----------|------|
| 主语 | Science | 科学 |
| 插入语 | , in practice, | 两个逗号夹住，可先跳过；意为"在实践中" |
| 谓语 | depends | 依赖 |
| 比较结构 | far less on A than on B | **A 远不如 B 重要**；far 加强语气 |
| A（次要） | the experiments it prepares | 实验本身；"it prepares" 是定语从句修饰 experiments（省略了 that） |
| B（重要） | the preparedness of the minds of the men who watch the experiments | 观察实验的人的思维准备度；"who watch the experiments" 是定语从句修饰 men |

**翻译：** 科学在实践中，对它所准备的实验的依赖，远远不如对观察这些实验的人的思维准备度的依赖。

**关键点：**
- 插入语 "in practice" 用两个逗号隔开，读句时直接跳过，先抓主干
- "far less...than..." 是**比较否定结构**：A 不如 B → 等价于 B 比 A 更重要
- 三层 of 连接：preparedness **of** the minds **of** the men **who**... → 从外到内：准备度 → 思维 → 人 → 观察实验的人

---

### lest：表示"以免"，后面接不希望发生的结果

**规律：**
- lest = 以免 / 免得
- 后面常接虚拟或省略 should 的结构
- 在阅读中，lest 后面通常是主语担心别人产生的负面看法

**示例：ambition 文章第69题**

**原文关键句：**
> people cannot confess fully to their dreams, as easily and openly as once they could, lest they be thought pushing, acquisitive and vulgar.

**理解：**
- 人们不能像过去那样公开承认自己的梦想
- 原因是：怕被别人认为是 pushing / acquisitive / vulgar
- lest they be thought... = 以免他们被认为……

**答案：**
- [D] they do not want to appear greedy and contemptible ✓

**方法总结：**
- lest 后面说的是"害怕被别人怎么看"
- 原文 be thought pushing, acquisitive and vulgar
- 答案 appear greedy and contemptible 是同义改写
</script>

  <script>
    (function () {
      const state = {
        title: "考研英语阅读技巧手记",
        chapters: [],
        current: 0,
        mode: "focus",
        test: false,
        query: ""
      };

      const $ = (id) => document.getElementById(id);

      const els = {
        navList: $("navList"),
        chapterCount: $("chapterCount"),
        searchInput: $("searchInput"),
        focusView: $("focusView"),
        flowView: $("flowView"),
        focusModeBtn: $("focusModeBtn"),
        flowModeBtn: $("flowModeBtn"),
        testModeBtn: $("testModeBtn"),
        printBtn: $("printBtn"),
        importBtn: $("importBtn"),
        themeBtn: $("themeBtn"),
        lessonKicker: $("lessonKicker"),
        lessonTitle: $("lessonTitle"),
        lessonMeta: $("lessonMeta"),
        sectionStrip: $("sectionStrip"),
        lessonBody: $("lessonBody"),
        prevBtn: $("prevBtn"),
        nextBtn: $("nextBtn"),
        progressText: $("progressText"),
        flowTitle: $("flowTitle"),
        flowContent: $("flowContent"),
        quickList: $("quickList"),
        statChapters: $("statChapters"),
        statSections: $("statSections"),
        uploader: $("uploader"),
        dropZone: $("dropZone"),
        chooseFileBtn: $("chooseFileBtn"),
        closeUploadBtn: $("closeUploadBtn"),
        fileInput: $("fileInput")
      };

      function escapeHTML(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function slugify(text, index) {
        return "chapter-" + index + "-" + String(text).replace(/[^\w\u4e00-\u9fa5]+/g, "-").replace(/^-|-$/g, "");
      }

      function cleanTitle(text) {
        return String(text || "")
          .replace(/^#+\s*/, "")
          .replace(/^[一二三四五六七八九十]+[、.．]\s*/, "")
          .trim();
      }

      function stripPhonetics(text) {
        return String(text || "")
          .replace(/\s*`\/[^`\n]+\/`\s*/g, " ")
          .replace(/\s*\/[A-Za-zɪʊəɔæɑɛɜːˈˌθðʃʒŋɡɒʌeɚ\-\s]+\/\s*/g, " ")
          .replace(/[ \t]{2,}/g, " ");
      }

      function parseMarkdownDocument(md) {
        const normalized = stripPhonetics(md || "").replace(/\r\n?/g, "\n");
        const titleMatch = normalized.match(/^#\s+(.+)$/m);
        const title = titleMatch ? titleMatch[1].trim() : "考研英语阅读技巧手记";
        const chapterMatches = [...normalized.matchAll(/^##\s+(.+)$/gm)];

        if (!chapterMatches.length) {
          return {
            title,
            chapters: [{
              id: "chapter-0",
              title,
              rawTitle: title,
              body: normalized.replace(/^#\s+.+$/m, "").trim(),
              sections: []
            }]
          };
        }

        const chapters = chapterMatches.map((match, index) => {
          const start = match.index + match[0].length;
          const end = index + 1 < chapterMatches.length ? chapterMatches[index + 1].index : normalized.length;
          const body = normalized.slice(start, end).trim().replace(/^-{3,}\s*/gm, "").trim();
          const rawTitle = match[1].trim();
          const sections = [...body.matchAll(/^###\s+(.+)$/gm)].map((sec, secIndex) => ({
            id: `chapter-${index}-section-${secIndex}`,
            title: cleanTitle(sec[1])
          }));

          return {
            id: slugify(rawTitle, index),
            title: cleanTitle(rawTitle),
            rawTitle,
            body,
            sections
          };
        });

        return { title, chapters };
      }

      function parseInline(text) {
        let value = escapeHTML(text);
        value = value.replace(/`([^`]+)`/g, "<code>$1</code>");
        value = value.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        value = value.replace(/\*([^*]+)\*/g, "<em>$1</em>");
        value = value.replace(/(✓|正确)/g, "<strong>$1</strong>");
        return value;
      }

      function renderMarkdown(md, options = {}) {
        const lines = String(md || "").split("\n");
        let html = "";
        let inTable = false;
        let tableHeaderNext = false;
        let listType = "";
        let quoteBuffer = [];

        function closeList() {
          if (listType) {
            html += `</${listType}>`;
            listType = "";
          }
        }

        function closeTable() {
          if (inTable) {
            html += "</tbody></table>";
            inTable = false;
            tableHeaderNext = false;
          }
        }

        function flushQuote() {
          if (quoteBuffer.length) {
            html += `<blockquote>${quoteBuffer.map((line) => `<p>${parseInline(line)}</p>`).join("")}</blockquote>`;
            quoteBuffer = [];
          }
        }

        for (let i = 0; i < lines.length; i++) {
          const raw = lines[i];
          const line = raw.trim();

          if (!line || /^-{3,}$/.test(line)) {
            flushQuote();
            closeList();
            closeTable();
            continue;
          }

          if (line.startsWith(">")) {
            closeList();
            closeTable();
            quoteBuffer.push(line.replace(/^>\s?/, ""));
            continue;
          }

          flushQuote();

          if (line.startsWith("|")) {
            closeList();
            const cells = line.split("|").slice(1, -1).map((cell) => cell.trim());
            const separator = cells.every((cell) => /^:?-{3,}:?$/.test(cell));
            if (separator) {
              tableHeaderNext = false;
              continue;
            }
            if (!inTable) {
              inTable = true;
              tableHeaderNext = true;
              html += "<table><tbody>";
            }
            const tag = tableHeaderNext ? "th" : "td";
            html += `<tr>${cells.map((cell) => `<${tag}>${parseInline(cell)}</${tag}>`).join("")}</tr>`;
            tableHeaderNext = false;
            continue;
          }

          closeTable();

          const heading = line.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            closeList();
            const level = heading[1].length;
            const tag = level <= 2 ? "h2" : level === 3 ? "h3" : "h4";
            const title = cleanTitle(heading[2]);
            const id = options.headingIds ? ` id="${escapeHTML(slugify(title, options.headingSeed || 0) + "-" + i)}"` : "";
            html += `<${tag}${id}>${parseInline(title)}</${tag}>`;
            continue;
          }

          const unordered = line.match(/^[-*+]\s+(.+)$/);
          const ordered = line.match(/^\d+\.\s+(.+)$/);
          if (unordered || ordered) {
            const desiredType = unordered ? "ul" : "ol";
            if (listType && listType !== desiredType) closeList();
            if (!listType) {
              listType = desiredType;
              html += `<${listType}>`;
            }
            html += `<li>${parseInline((unordered || ordered)[1])}</li>`;
            continue;
          }

          closeList();
          html += `<p>${parseInline(line)}</p>`;
        }

        flushQuote();
        closeList();
        closeTable();
        return html;
      }

      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        sessionStorage.setItem("reading-theme", theme);
        els.themeBtn.textContent = theme === "dark" ? "☀" : "☾";
      }

      function initTheme() {
        const saved = sessionStorage.getItem("reading-theme");
        if (saved) {
          setTheme(saved);
          return;
        }
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const hour = new Date().getHours();
        setTheme(prefersDark || hour >= 18 || hour < 6 ? "dark" : "light");
      }

      function chapterMatches(chapter, query) {
        if (!query) return true;
        const needle = query.toLowerCase();
        return (chapter.title + "\n" + chapter.body).toLowerCase().includes(needle);
      }

      function renderNav() {
        const visible = state.chapters
          .map((chapter, index) => ({ chapter, index }))
          .filter(({ chapter }) => chapterMatches(chapter, state.query));

        els.navList.innerHTML = visible.map(({ chapter, index }) => `
          <li>
            <button class="nav-item ${index === state.current ? "active" : ""}" type="button" data-index="${index}">
              <span class="nav-num">${String(index + 1).padStart(2, "0")}</span>
              <span class="nav-text">${escapeHTML(chapter.title)}</span>
            </button>
          </li>
        `).join("") || `<li class="empty">没有匹配到内容</li>`;
      }

      function buildSectionStrip(chapter) {
        if (!chapter.sections.length) {
          els.sectionStrip.innerHTML = `<span class="tag">本章暂无小节标题</span>`;
          return;
        }
        els.sectionStrip.innerHTML = chapter.sections.map((section) => `
          <button class="section-chip" type="button" data-section="${escapeHTML(section.title)}">${escapeHTML(section.title)}</button>
        `).join("");
      }

      function renderFocus(index) {
        if (!state.chapters.length) return;
        state.current = Math.max(0, Math.min(index, state.chapters.length - 1));
        const chapter = state.chapters[state.current];
        els.lessonKicker.textContent = `Chapter ${String(state.current + 1).padStart(2, "0")}`;
        els.lessonTitle.textContent = chapter.title;
        els.lessonMeta.innerHTML = `
          <span class="tag">${chapter.sections.length || 1} 个小节</span>
          <span class="tag">${chapter.body.length} 字符</span>
        `;
        buildSectionStrip(chapter);
        els.lessonBody.innerHTML = renderMarkdown(`## ${chapter.title}\n\n${chapter.body}`);
        els.lessonBody.scrollTop = 0;
        els.prevBtn.disabled = state.current === 0;
        els.nextBtn.disabled = state.current === state.chapters.length - 1;
        els.progressText.textContent = `${state.current + 1} / ${state.chapters.length} · 键盘 ← / → 可切换章节`;
        renderNav();
      }

      function renderFlow() {
        els.flowTitle.textContent = state.title;
        els.flowContent.innerHTML = state.chapters.map((chapter, index) => `
          <section class="flow-section" id="${escapeHTML(chapter.id)}">
            ${renderMarkdown(`## ${String(index + 1).padStart(2, "0")} ${chapter.title}\n\n${chapter.body}`, { headingIds: true, headingSeed: index })}
          </section>
        `).join("");
      }

      function renderRail() {
        const quickItems = [
          ["先读题干", "先看定位词，再串联题干逻辑推主题。"],
          ["转折优先", "but / however / now 后面往往是答案区。"],
          ["时间反转", "题干与原文时间对立时，重点常在新时间附近。"],
          ["答案气质", "some / may / partly 这类缓和语气要优先留意。"],
          ["例证题", "别选例子本身，找例子支撑的观点。"]
        ];
        els.quickList.innerHTML = quickItems.map(([title, body]) => `
          <div class="quick-card"><strong>${escapeHTML(title)}</strong><br>${escapeHTML(body)}</div>
        `).join("");
        els.statChapters.textContent = state.chapters.length;
        els.statSections.textContent = state.chapters.reduce((sum, chapter) => sum + chapter.sections.length, 0);
      }

      function setMode(mode) {
        state.mode = mode;
        const flow = mode === "flow";
        els.focusView.classList.toggle("hidden", flow);
        els.flowView.classList.toggle("hidden", !flow);
        els.focusModeBtn.classList.toggle("active", !flow);
        els.flowModeBtn.classList.toggle("active", flow);
        renderNav();
        if (flow) {
          requestAnimationFrame(() => {
            scrollFlowToChapter(state.current);
          });
        }
      }

      function scrollFlowToChapter(index) {
        const chapter = state.chapters[index];
        if (!chapter) return;
        const target = document.getElementById(chapter.id);
        if (!target) return;
        if (els.flowView.scrollHeight > els.flowView.clientHeight + 4) {
          els.flowView.scrollTop = Math.max(0, target.offsetTop - els.flowView.offsetTop - 24);
        } else {
          target.scrollIntoView({ block: "start" });
        }
      }

      function toggleTestMode() {
        state.test = !state.test;
        document.body.classList.toggle("test-mode", state.test);
        els.testModeBtn.classList.toggle("active", state.test);
      }

      function loadMarkdown(md) {
        const parsed = parseMarkdownDocument(md);
        state.title = parsed.title;
        state.chapters = parsed.chapters;
        state.current = 0;
        document.title = state.title;
        els.chapterCount.textContent = `${state.chapters.length} 章`;
        renderFocus(0);
        renderFlow();
        renderRail();
      }

      async function loadDefaultMarkdown() {
        const embedded = $("embeddedMarkdown").textContent.trim();
        loadMarkdown(embedded);
        try {
          const response = await fetch("英语阅读笔记.md", { cache: "no-store" });
          if (!response.ok) return;
          const text = await response.text();
          if (text.trim() && text.trim() !== embedded.trim()) {
            loadMarkdown(text);
          }
        } catch (error) {
          // file:// 打开时浏览器会拦截同目录读取，此时使用内置笔记。
        }
      }

      function readFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          loadMarkdown(String(reader.result || ""));
          els.uploader.classList.remove("active");
        };
        reader.readAsText(file);
      }

      function bindEvents() {
        els.navList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-index]");
          if (!button) return;
          const index = Number(button.dataset.index);
          renderFocus(index);
          if (state.mode === "flow") {
            scrollFlowToChapter(index);
          } else {
            setMode("focus");
          }
        });

        els.sectionStrip.addEventListener("click", (event) => {
          const button = event.target.closest("[data-section]");
          if (!button) return;
          const headings = [...els.lessonBody.querySelectorAll("h3, h4")];
          const target = headings.find((heading) => heading.textContent.trim() === button.dataset.section);
          if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
        });

        els.searchInput.addEventListener("input", () => {
          state.query = els.searchInput.value.trim();
          renderNav();
        });

        els.prevBtn.addEventListener("click", () => renderFocus(state.current - 1));
        els.nextBtn.addEventListener("click", () => renderFocus(state.current + 1));
        els.focusModeBtn.addEventListener("click", () => setMode("focus"));
        els.flowModeBtn.addEventListener("click", () => setMode("flow"));
        els.testModeBtn.addEventListener("click", toggleTestMode);
        els.printBtn.addEventListener("click", () => {
          setMode("flow");
          setTimeout(() => window.print(), 80);
        });
        els.importBtn.addEventListener("click", () => els.uploader.classList.add("active"));
        els.closeUploadBtn.addEventListener("click", () => els.uploader.classList.remove("active"));
        els.chooseFileBtn.addEventListener("click", () => els.fileInput.click());
        els.fileInput.addEventListener("change", () => {
          if (els.fileInput.files && els.fileInput.files[0]) readFile(els.fileInput.files[0]);
        });
        els.themeBtn.addEventListener("click", () => {
          const current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
          setTheme(current === "dark" ? "light" : "dark");
        });

        ["dragenter", "dragover"].forEach((name) => {
          els.dropZone.addEventListener(name, (event) => {
            event.preventDefault();
            els.dropZone.style.borderColor = "var(--accent)";
          });
        });
        ["dragleave", "drop"].forEach((name) => {
          els.dropZone.addEventListener(name, (event) => {
            event.preventDefault();
            els.dropZone.style.borderColor = "";
          });
        });
        els.dropZone.addEventListener("drop", (event) => {
          const file = event.dataTransfer.files && event.dataTransfer.files[0];
          if (file) readFile(file);
        });

        document.addEventListener("keydown", (event) => {
          if (event.target && ["INPUT", "TEXTAREA"].includes(event.target.tagName)) return;
          if (event.key === "ArrowLeft") renderFocus(state.current - 1);
          if (event.key === "ArrowRight") renderFocus(state.current + 1);
        });

        els.lessonBody.addEventListener("click", () => {
          if (state.test) els.lessonBody.classList.toggle("reveal");
        });
      }

      initTheme();
      bindEvents();
      loadDefaultMarkdown();
    })();
  </script>

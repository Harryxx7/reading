<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考研英语长难句精读手记 - 暖色宣纸风</title>
  
  <!-- 引入 Google Fonts 高级西文字体 (Georgia 备用，这里引入衬线体与无衬线体) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- 引入 Marked.js 用于解析 Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ==========================================
       🎨 设计系统设计标记 (CSS Variables & Tokens)
       ========================================== */
    :root {
      /* 背景与卡片 - 暖色宣纸底色 */
      --bg: #FBF9F4;             
      --bg-elevated: #FFFFFF;    
      --card: #F2EBDC;           
      --card-strong: #ECE2CC;    
      --border: #E8E0D0;         
      --border-strong: #D4C9B0;  
      --table-alt: #F5F0E5;      
      
      /* 文字色彩 */
      --text-primary: #2D2A26;   /* 柔和炭黑 */
      --text-secondary: #6B6660; /* 辅助灰褐 */
      --text-muted: #9A9489;     /* 哑光占位 */
      
      /* 语法成分高亮与特色调色板 */
      --accent-primary: #B85C38;   /* 赭石红（主句） */
      --accent-secondary: #2B5A87; /* 沉静蓝（从句/修饰） */
      --accent-tertiary: #5B7A4B;  /* 苔藓绿（状语/说明） */
      --accent-purple: #7A5C8F;    /* 哑光紫（定语/插入） */
      --highlight: #FFF1B8;        /* 荧光黄 */
      
      /* 投影与动效 */
      --shadow: 0 10px 30px rgba(45, 42, 38, 0.03), 0 1px 3px rgba(45, 42, 38, 0.02);
      --transition-spring: 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      
      --topbar-height: 56px;
      --sidebar-width: 260px;
    }

    [data-theme="dark"] {
      /* 背景与卡片 - 温暖曜石黑 */
      --bg: #1A1714;             
      --bg-elevated: #24201A;    
      --card: #25201A;           
      --card-strong: #302A22;    
      --border: #332C24;         
      --border-strong: #463E33;  
      --table-alt: #201C16;      
      
      /* 文字色彩 */
      --text-primary: #E8E2D5;   /* 柔和羊皮纸白 */
      --text-secondary: #B5AEA0; /* 辅助灰 */
      --text-muted: #8A8478;     
      
      /* 语法高亮 */
      --accent-primary: #E89568;   
      --accent-secondary: #7BA8D9; 
      --accent-tertiary: #9CB888;  
      --accent-purple: #B89BC9;    
      --highlight: #5C4F1E;        
      
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.4), 0 1px 8px rgba(0, 0, 0, 0.2);
    }

    /* 全局复位与排版规范 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      transition: background-color var(--transition-smooth), color var(--transition-smooth);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 衬线体 (用于英文长难句) */
    .serif-text {
      font-family: 'Lora', Charter, "Iowan Old Style", "Source Serif Pro", Georgia, serif;
    }

    /* 无衬线体 */
    .sans-text {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    /* ==========================================
       🏛 顶栏与布局架构 (Topbar & Sidebar Layout)
       ========================================== */
    .topbar {
      height: var(--topbar-height);
      background-color: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      position: relative;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      fill: var(--accent-primary);
    }

    .logo-text {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-primary);
    }

    .controls-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* 按钮基础样式 */
    .btn {
      background-color: var(--bg-elevated);
      border: 0.5px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition-smooth);
      box-shadow: var(--shadow);
    }

    .btn:hover {
      border-color: var(--border-strong);
      color: var(--text-primary);
      background-color: var(--card);
    }

    .btn-active {
      background-color: var(--accent-primary);
      color: #FFFFFF !important;
      border-color: var(--accent-primary);
    }

    .btn-active:hover {
      background-color: color-mix(in srgb, var(--accent-primary) 90%, #000);
      border-color: var(--accent-primary);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      padding: 0;
      justify-content: center;
      border-radius: 50%;
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* 主容器 */
    .app-container {
      flex: 1;
      display: flex;
      height: calc(100vh - var(--topbar-height));
      position: relative;
      overflow: hidden;
    }

    /* 侧边栏 */
    .sidebar {
      width: var(--sidebar-width);
      border-right: 0.5px solid var(--border);
      background-color: color-mix(in srgb, var(--bg) 95%, transparent);
      display: flex;
      flex-direction: column;
      transition: transform var(--transition-smooth), width var(--transition-smooth);
      overflow: hidden;
      z-index: 90;
    }

    .sidebar-header {
      padding: 16px 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8px;
      list-style: none;
    }

    .sidebar-item {
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13.5px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      transition: all var(--transition-smooth);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-item::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--border-strong);
      transition: background-color var(--transition-smooth);
    }

    .sidebar-item:hover {
      background-color: var(--card);
      color: var(--text-primary);
    }

    .sidebar-item.active {
      background-color: var(--card-strong);
      color: var(--text-primary);
      font-weight: 500;
    }

    .sidebar-item.active::before {
      background-color: var(--accent-primary);
    }

    /* 主展示区 */
    .main-viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-color: var(--bg);
    }

    /* ==========================================
       ⚡ 精读卡片模式 (Interactive Card Layout)
       ========================================== */
    .card-mode-container {
      width: 100%;
      height: 100%;
      padding: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sentence-card {
      background-color: var(--bg-elevated);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      flex: 1;
      display: none; /* JS 控制 active 显示 */
      flex-direction: column;
      overflow: hidden;
      transition: background-color var(--transition-smooth), border-color var(--transition-smooth);
    }

    .sentence-card.active {
      display: flex;
      animation: cardEntrance var(--transition-spring);
    }

    @keyframes cardEntrance {
      0% {
        opacity: 0;
        transform: translateY(18px) scale(0.99);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* 卡片头部 */
    .card-header {
      padding: 18px 24px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: color-mix(in srgb, var(--card) 30%, var(--bg-elevated));
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      background-color: var(--accent-primary);
      color: #FFFFFF;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    /* 卡片内容分区 */
    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 区域 1：英文原句区域 */
    .zone-original {
      padding: 24px;
      border-bottom: 0.5px solid var(--border);
      background-color: color-mix(in srgb, var(--card) 10%, var(--bg-elevated));
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .quote-content {
      font-size: 21px;
      line-height: 1.6;
      color: var(--text-primary);
      text-align: center;
      max-width: 900px;
      font-weight: 400;
      position: relative;
    }

    .quote-content::before {
      content: '“';
      position: absolute;
      left: -24px;
      top: -10px;
      font-size: 48px;
      color: var(--border-strong);
      opacity: 0.5;
      font-family: Georgia, serif;
    }

    /* 区域 2：双栏区域 */
    .zone-middle {
      flex: 1;
      min-height: 0; /* 激活子项独立滚动 */
      display: grid;
      grid-template-columns: 58fr 42fr;
      border-bottom: 0.5px solid var(--border);
    }

    .column-zone {
      height: 100%;
      overflow-y: auto;
      padding: 24px;
      transition: opacity var(--transition-smooth), filter var(--transition-smooth);
    }

    .column-left {
      border-right: 0.5px solid var(--border);
    }

    .zone-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-primary);
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
    }

    .zone-title svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* 区域 3：底部翻译与启示 */
    .zone-translation {
      padding: 24px;
      background-color: color-mix(in srgb, var(--card) 15%, var(--bg-elevated));
      overflow-y: auto;
      max-height: 180px;
      min-height: 100px;
      transition: opacity var(--transition-smooth), filter var(--transition-smooth);
    }

    /* 卡片底栏导航 */
    .card-footer {
      padding: 14px 24px;
      border-top: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: var(--bg-elevated);
    }

    /* ==========================================
       📜 长卷模式 (Continuous Flow Layout)
       ========================================== */
    .flow-mode-container {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 40px 24px;
      display: none; /* JS 控制显示 */
    }

    .flow-content {
      max-width: 960px;
      margin: 0 auto;
    }

    .flow-header {
      text-align: center;
      margin-bottom: 48px;
      padding-bottom: 24px;
      border-bottom: 0.5px solid var(--border-strong);
    }

    .flow-header h1 {
      font-size: 32px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .flow-header p {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .flow-card-item {
      background-color: var(--bg-elevated);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
    }

    .flow-card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .flow-original {
      font-size: 18px;
      line-height: 1.6;
      color: var(--text-primary);
      padding: 16px 20px;
      background-color: var(--card);
      border-radius: 8px;
      margin-bottom: 24px;
      border-left: 3px solid var(--accent-primary);
    }

    .flow-sections {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ==========================================
       🎨 Markdown 内容样式美化 (Markdown Styling)
       ========================================== */
    
    /* 表格美化 */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 13.5px;
      line-height: 1.5;
    }

    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 0.5px solid var(--border);
    }

    th {
      font-weight: 600;
      color: var(--text-primary);
      background-color: var(--card);
      border-top: 0.5px solid var(--border);
    }

    tr:nth-child(even) td {
      background-color: var(--table-alt);
    }

    td strong {
      color: var(--accent-primary);
    }

    /* 列表与文字修饰 */
    ul, ol {
      padding-left: 20px;
      margin-bottom: 12px;
    }

    li {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    li strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* 荧光笔高亮 */
    mark {
      background-color: var(--highlight);
      color: inherit;
      padding: 0 2px;
      border-radius: 2px;
    }

    /* ==========================================
       🔍 离线/CORS 拖拽降级组件 (CORS Fallback)
       ========================================== */
    .file-uploader-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg);
      display: none; /* JS 控制显示 */
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 1000;
    }

    .uploader-card {
      background-color: var(--bg-elevated);
      border: 1px dashed var(--border-strong);
      border-radius: 20px;
      padding: 48px;
      max-width: 560px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: all var(--transition-smooth);
    }

    .uploader-card.dragover {
      background-color: var(--card);
      border-color: var(--accent-primary);
      transform: scale(1.02);
    }

    .uploader-icon {
      width: 64px;
      height: 64px;
      fill: var(--accent-primary);
      margin-bottom: 24px;
      opacity: 0.8;
    }

    .uploader-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .uploader-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .file-input-btn {
      position: relative;
      overflow: hidden;
    }

    .file-input-btn input[type="file"] {
      position: absolute;
      font-size: 100px;
      right: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* ==========================================
       🧠 Active Recall 刮刮卡自测模式
       ========================================== */
    .test-masked .column-right,
    .test-masked .zone-translation,
    .test-masked .flow-sections {
      filter: blur(14px);
      opacity: 0.15;
      cursor: help;
      transition: filter 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .test-masked .column-right:hover,
    .test-masked .zone-translation:hover,
    .test-masked .flow-sections:hover {
      filter: blur(0);
      opacity: 1;
      cursor: default;
    }

    /* ==========================================
       📱 移动端与响应式适配
       ========================================== */
    @media (max-width: 1100px) {
      body {
        height: auto !important;
        overflow-y: auto !important;
      }

      .topbar {
        position: sticky;
        top: 0;
      }

      .app-container {
        height: auto !important;
        flex-direction: column;
        overflow: visible !important;
      }

      .sidebar {
        width: 100% !important;
        height: 220px !important;
        border-right: none;
        border-bottom: 0.5px solid var(--border);
        flex-shrink: 0;
      }

      .main-viewport {
        height: auto !important;
        overflow: visible !important;
      }

      .card-mode-container {
        height: auto !important;
        overflow: visible !important;
        padding: 12px;
      }

      .sentence-card {
        height: auto !important;
        overflow: visible !important;
      }

      .card-body {
        height: auto !important;
        overflow: visible !important;
      }

      .zone-original {
        position: sticky;
        top: var(--topbar-height);
        z-index: 80;
        box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      }

      .zone-middle {
        grid-template-columns: 1fr !important;
        height: auto !important;
        min-height: 0 !important;
      }

      .column-zone {
        height: auto !important;
        overflow-y: visible !important;
        border-right: none !important;
      }

      .column-left {
        border-bottom: 0.5px solid var(--border);
      }

      .zone-translation {
        max-height: none !important;
        height: auto !important;
        overflow-y: visible !important;
      }
    }

    /* ==========================================
       🖨️ PDF 印刷级打印专用优化 (@media print)
       ========================================== */
    @media print {
      body {
        background-color: #FFFFFF !important;
        color: #000000 !important;
        height: auto !important;
        overflow: visible !important;
        font-size: 12pt !important;
      }

      /* 强行背景输出 */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* 隐藏所有界面控件、顶栏、侧边栏、自测状态 */
      .topbar, 
      .sidebar, 
      .card-footer, 
      .no-print, 
      .file-uploader-container,
      .controls-area,
      .btn,
      .mode-controls {
        display: none !important;
      }

      /* 移除模糊遮罩，打印必须全部清晰 */
      .test-masked .column-right,
      .test-masked .zone-translation,
      .test-masked .flow-sections {
        filter: none !important;
        opacity: 1 !important;
      }

      /* 强行展示全流文档 */
      .app-container {
        display: block !important;
        height: auto !important;
        overflow: visible !important;
      }

      .main-viewport {
        display: block !important;
        height: auto !important;
        overflow: visible !important;
      }

      .card-mode-container {
        display: none !important; /* 打印时隐藏单卡模式，改用打印结构 */
      }

      .flow-mode-container {
        display: block !important;
        padding: 0 !important;
        height: auto !important;
        overflow: visible !important;
      }

      .flow-content {
        max-width: 100% !important;
      }

      .flow-card-item {
        box-shadow: none !important;
        border: none !important;
        border-bottom: 1px solid #CCCCCC !important;
        margin-bottom: 0 !important;
        padding: 30px 0 !important;
        /* 核心：每句卡片在打印时自动插入分页符，实现一句一页的完美 PDF */
        page-break-before: always !important;
      }

      .flow-card-item:first-of-type {
        page-break-before: avoid !important;
      }

      .flow-original {
        background-color: #F8F9FA !important;
        border: 1px solid #E2E8F0 !important;
        border-left: 4px solid #B85C38 !important;
        color: #000000 !important;
      }

      /* 打印排版表格适应 */
      table {
        page-break-inside: avoid !important;
        width: 100% !important;
      }

      tr {
        page-break-inside: avoid !important;
      }

      th {
        background-color: #ECECEE !important;
        color: #000000 !important;
      }

      tr:nth-child(even) td {
        background-color: #F8F9FA !important;
      }
    }
  </style>
</head>
<body>

  <!-- ==========================================
       🏛 顶栏 (Topbar)
       ========================================== -->
  <header class="topbar no-print">
    <div class="logo-area">
      <!-- 带有东方宣纸美感的印章/Logo -->
      <svg class="logo-icon" viewBox="0 0 24 24">

      <svg class="uploader-icon" viewBox="0 0 24 24">
        <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,21H18A2,2 0 0,0 20,19V8L14,2M13,9V3.5L18.5,9H13M6,20V4H12V10H18V20H6M15,18V15H17L14,12L11,15H13V18H15Z"/>
      </svg>
      <h2 class="uploader-title">本地运行安全保护 (CORS)</h2>
      <p class="uploader-desc">
        检测到您正在以本地 `file://` 协议离线打开此页面。由于浏览器的跨域安全策略，无法自动加载同一文件夹下的笔记。
        <br><br>
        请在下方<strong>选择</strong>或<strong>直接拖拽拖入</strong>您的 <strong>`长难句手记.md`</strong> 即可瞬间完成离线解析。
      </p>
      
      <button class="btn btn-active file-input-btn">

  <!-- ==========================================
       🧠 核心应用交互引擎 (JS)
       ========================================== -->
  <script>
    // 全局数据状态
    let appState = {
      sentences: [],          // 解析出的结构化句子列表
      currentIndex: 0,        // 当前卡片索引
      currentTheme: 'light',  // 亮/暗主题
      viewMode: 'card',       // 视图模式: 'card' | 'flow'
      isTestMode: false       // 自测模糊模式状态
    };

    // 页面初始化
    document.addEventListener("DOMContentLoaded", () => {
      // 1. 初始化系统自动追踪及暗黑模式设置
      initTheme();

      // 2. 注册本地文件选择器事件
      setupFileUploader();

      // 3. 尝试拉取同级目录下的长难句手记.md
      loadDefaultMarkdown();
    });

    // 尝试拉取默认 markdown
    async function loadDefaultMarkdown() {
      try {
        const response = await fetch('长难句手记.md');
        if (!response.ok) {
          throw new Error(`HTTP 异常！状态码: ${response.status}`);
        }
        const text = await response.text();
        parseAndRenderApp(text);
      } catch (error) {
        console.warn("无法自动拉取长难句手记.md (通常是本地 file:// 打开时的 CORS 限制):", error);
        // 优雅降级：显示拖拽上传框
        document.getElementById("local-file-uploader").style.display = "flex";
      }
    }

    // 拖拽与文件选择器逻辑
    function setupFileUploader() {
      const dropZone = document.getElementById("drop-zone");
      const fileSelector = document.getElementById("file-selector");
      const uploaderContainer = document.getElementById("local-file-uploader");

      // 阻止默认拖拽行为
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
      });

      function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      // 拖拽高亮
      ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
      });

      ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
      });

      // 拖拽释放文件
      dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length > 0) {
          handleFile(files[0]);
        }
      });

      // 手动选择文件
      fileSelector.addEventListener('change', (e) => {
        const files = e.target.files;
        if (files.length > 0) {
          handleFile(files[0]);
        }
      });

      function handleFile(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const text = e.target.result;
          parseAndRenderApp(text);
          // 隐藏上传层
          uploaderContainer.style.opacity = '0';
          setTimeout(() => {
            uploaderContainer.style.display = 'none';
          }, 300);
        };
        reader.readAsText(file);
      }
    }

    // ==========================================
    // 🧠 核心：智能 Markdown 数据库切分与解析
    // ==========================================
    function parseAndRenderApp(mdText) {
      if (!mdText) return;

      const lines = mdText.split('\n');
      let sentences = [];
      let currentSentence = null;
      let docTitle = "考研英语长难句精读手记";
      let docDesc = "";

      // 提取文档大标题
      for(let i=0; i<lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('# ')) {
          docTitle = line.substring(2);
          break;
        }
      }

      // 将文件通过 ## 进行切分
      const blocks = mdText.split(/\n##\s+/);
      
      // 第一个块通常是标题和前言描述，抓取第一块中 H1 下面的普通段落
      if (blocks.length > 0) {
        const firstBlock = blocks[0];
        const matchDesc = firstBlock.match(/\n([^#\-\*\>\s][^\n]+)/);
        if (matchDesc) docDesc = matchDesc[1];
      }

      // 从第二个块开始，每个块都是一个完整的长难句卡片
      for (let k = 1; k < blocks.length; k++) {
        const block = blocks[k];
        const blockLines = block.split('\n');
        
        // 1. 卡片标题
        const title = blockLines[0].trim();
        
        // 2. 原文长难句 (寻找 blockquote)
        let originalText = "";
        const quoteBlockMatches = block.match(/>\s*([^\n]+(\n>[^\n]+)*)/);
        if (quoteBlockMatches) {
          originalText = quoteBlockMatches[1].replace(/>/g, '').replace(/\n/g, ' ').trim();
        }

        // 3. 语法拆解、词汇与翻译分区提取 (智能模糊识别 H3)
        let syntaxMarkdown = "";
        let vocabMarkdown = "";
        let translationMarkdown = "";
        
        // 通过 ### 划分小版块
        const subSections = block.split(/\n###\s+/);
        
        for(let s = 1; s < subSections.length; s++) {
          const subSec = subSections[s];
          const secTitleLine = subSec.split('\n')[0].trim();
          const secContent = subSec.substring(subSec.indexOf('\n') + 1).trim();
          
          // 模糊识别标题分配到正确的左右双栏布局容器中
          if (secTitleLine.includes("句法") || secTitleLine.includes("拆解") || secTitleLine.includes("结构") || secTitleLine.includes("syntax")) {
            syntaxMarkdown = secContent;
          } else if (secTitleLine.includes("词汇") || secTitleLine.includes("单词") || secTitleLine.includes("vocab") || secTitleLine.includes("word")) {
            vocabMarkdown = secContent;
          } else if (secTitleLine.includes("翻译") || secTitleLine.includes("译文") || secTitleLine.includes("启示") || secTitleLine.includes("心得")) {
            translationMarkdown = secContent;
          } else {
            // 兜底其它未知 H3 分配到翻译与启示底部区
            translationMarkdown += `\n\n### ${secTitleLine}\n${secContent}`;
          }
        }

        // 装载结构化句子数据对象
        sentences.push({
          index: k - 1,
          title: title,
          original: originalText,
          syntaxHTML: marked.parse(syntaxMarkdown),
          vocabHTML: marked.parse(vocabMarkdown),
          translationHTML: marked.parse(translationMarkdown),
          rawMarkdown: block // 用于长卷展示容错
        });
      }

      // 将解析出来的数据放入全局状态
      appState.sentences = sentences;
      
      // 更新标题
      document.title = `${docTitle} - 暖色宣纸风`;
      
      // 渲染侧边栏
      renderSidebar();
      
      // 渲染主体视图
      if (sentences.length > 0) {
        renderCard(0);
        renderFlowMode(docTitle, docDesc);
      } else {
        showEmptyState();
      }
    }

    // ==========================================
    // 🎨 UI 渲染模块 (Card & Sidebar Rendering)
    // ==========================================
    
    // 渲染侧边栏目录
    function renderSidebar() {
      const sidebarList = document.getElementById("sentence-list");
      const badge = document.getElementById("card-count-badge");
      sidebarList.innerHTML = "";
      
      badge.textContent = `${appState.sentences.length} 句`;

      appState.sentences.forEach((sentence, idx) => {
        const li = document.createElement("li");
        li.className = `sidebar-item ${idx === appState.currentIndex ? 'active' : ''}`;
        li.textContent = sentence.title;
        li.onclick = () => {
          if (appState.viewMode !== 'card') {
            switchViewMode('card');
          }
          renderCard(idx);
        };
        sidebarList.appendChild(li);
      });
    }

    // 渲染指定索引的卡片
    function renderCard(index) {
      if (index < 0 || index >= appState.sentences.length) return;
      appState.currentIndex = index;

      // 更新侧边栏选中态
      const sidebarItems = document.querySelectorAll(".sidebar-item");
      sidebarItems.forEach((item, idx) => {
        if (idx === index) item.classList.add("active");
        else item.classList.remove("active");
      });

      const sentence = appState.sentences[index];
      const cardContainer = document.getElementById("container-card-mode");
      
      // 构建 iOS 回弹效果卡片
      cardContainer.innerHTML = `
        <div class="sentence-card active">
          
          <!-- 卡片头部 -->
          <div class="card-header">
            <h3 class="card-title sans-text">
              <span class="badge">NO.${String(index + 1).padStart(2, '0')}</span>
              ${sentence.title}
            </h3>
            <span style="font-size:12px; color:var(--text-muted); font-weight:500;">
              ${index + 1} / ${appState.sentences.length}
            </span>
          </div>

          <div class="card-body">
            
            <!-- 区域 1：英文原句区 (使用优雅衬线体) -->
            <div class="zone-original">
              <p class="quote-content serif-text">${sentence.original}</p>
            </div>

            <!-- 区域 2：双栏区域 -->
            <div class="zone-middle">
              
              <!-- 左侧：句法解码 (无衬线) -->
              <div class="column-zone column-left">
                <h4 class="zone-title sans-text">
                  <svg viewBox="0 0 24 24"><path d="M19,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5C21,3.89 20.1,3 19,3M19,19H5V5H19V19M7,7H17V9H7V7M7,11H17V13H7V11M7,15H14V17H7V15Z"/></svg>
                  句法精细解码 (Syntax Analysis)
                </h4>
                <div class="markdown-body sans-text">
                  ${sentence.syntaxHTML || '<p style="color:var(--text-muted); font-style:italic;">暂无句法拆解信息</p>'}
                </div>
              </div>

              <!-- 右侧：核心词汇 (无衬线) -->
              <div class="column-zone column-right">
                <h4 class="zone-title sans-text">
                  <svg viewBox="0 0 24 24"><path d="M17,3H7A2,2 0 0,0 5,5V21L12,18L19,21V5C19,3.89 18.1,3 17,3M17,18L12,15.82L7,18V5H17V18Z"/></svg>
                  核心词汇速记 (Vocabulary)
                </h4>
                <div class="markdown-body sans-text">
                  ${sentence.vocabHTML || '<p style="color:var(--text-muted); font-style:italic;">暂无核心词汇整理</p>'}
                </div>
              </div>

            </div>

            <!-- 区域 3：底部翻译与做题启示 -->
            <div class="zone-translation">
              <h4 class="zone-title sans-text">
                <svg viewBox="0 0 24 24"><path d="M12.87,15.07L10.33,12.56L10.36,12.53C12.1,10.59 13.34,8.36 14.07,6H17V4H10V2H8V4H1V6H12.17C11.5,7.92 10.44,9.75 9,11.35C8.07,10.32 7.3,9.19 6.69,8H4.69C5.42,9.63 6.42,11.17 7.67,12.56L2.58,17.58L4,19L9,14L12.11,17.11L12.87,15.07M18.5,10H16.5L12,22H14L15.12,19H19.87L21,22H23L18.5,10M15.88,17L17.5,12.67L19.12,17H15.88Z"/></svg>
                参考译文与做题启示 (Translation & Insights)
              </h4>
              <div class="markdown-body sans-text">
                ${sentence.translationHTML || '<p style="color:var(--text-muted); font-style:italic;">暂无翻译参考</p>'}
              </div>
            </div>

          </div>

          <!-- 卡片底部导航控制栏 -->
          <div class="card-footer no-print">
            <button class="btn" onclick="prevCard()" ${index === 0 ? 'disabled' : ''}>
              <svg style="width:14px; height:14px; fill:currentColor;" viewBox="0 0 24 24"><path d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z"/></svg>
              上一句
            </button>
            <span style="font-size:12px; color:var(--text-muted); font-weight:500;">
              键盘左右键 [← / →] 可快速翻页
            </span>
            <button class="btn" onclick="nextCard()" ${index === appState.sentences.length - 1 ? 'disabled' : ''}>
              下一句
              <svg style="width:14px; height:14px; fill:currentColor;" viewBox="0 0 24 24"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
            </button>
          </div>

        </div>
      `;
    }

    // 渲染长卷模式内容 (PDF 打印模板)
    function renderFlowMode(docTitle, docDesc) {
      const flowContainer = document.getElementById("flow-content-target");
      flowContainer.innerHTML = "";

      // 1. 文档大标题
      const headerDiv = document.createElement("div");
      headerDiv.className = "flow-header";
      headerDiv.innerHTML = `
        <h1>${docTitle}</h1>
        <p>${docDesc || '考研英语高分复习笔记 · 排版系统打印版'}</p>
      `;
      flowContainer.appendChild(headerDiv);

      // 2. 依次渲染每一个卡片块 (使用 print-block 标记实现打印分页)
      appState.sentences.forEach((sentence, index) => {
        const itemDiv = document.createElement("div");
        itemDiv.className = "flow-card-item";
        itemDiv.innerHTML = `
          <div class="flow-card-title sans-text">
            <span>NO.${String(index + 1).padStart(2, '0')} ${sentence.title}</span>
            <span class="no-print" style="font-size:12px; font-weight:normal; color:var(--accent-primary); cursor:pointer;" onclick="switchViewMode('card'); renderCard(${index});">
              在卡片模式中刷这句 →
            </span>
          </div>
          
          <!-- 英文原句 -->
          <div class="flow-original serif-text">${sentence.original}</div>
          
          <!-- 解码、词汇、翻译并排铺开 -->
          <div class="flow-sections">
            <div style="margin-bottom:16px;">
              <h4 class="zone-title" style="margin-bottom:8px;">📌 句法精细解码</h4>
              <div class="markdown-body sans-text">${sentence.syntaxHTML}</div>
            </div>
            
            <div style="margin-bottom:16px;">
              <h4 class="zone-title" style="margin-bottom:8px;">📝 核心词汇速记</h4>
              <div class="markdown-body sans-text">${sentence.vocabHTML}</div>
            </div>
            
            <div>
              <h4 class="zone-title" style="margin-bottom:8px;">🎯 参考译文与做题启示</h4>
              <div class="markdown-body sans-text">${sentence.translationHTML}</div>
            </div>
          </div>
        `;
        flowContainer.appendChild(itemDiv);
      });
    }

    // 显示空数据状态
    function showEmptyState() {
      const cardContainer = document.getElementById("container-card-mode");
      cardContainer.innerHTML = `
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; padding:48px;">
          <div style="font-size:48px; margin-bottom:16px;">📂</div>
          <h3 style="margin-bottom:8px;">未解析到有效的长难句卡片</h3>
          <p style="color:var(--text-secondary); font-size:14px; max-width:400px; line-height:1.6;">
            请确保您的 <strong>`长难句手记.md`</strong> 包含以 <code>## 标题</code> 开始的句子分区，并按照指定模版编写。
          </p>
        </div>
      `;
    }

    // ==========================================
    // 💫 高级微交互控制 (Transitions & Toggles)
    // ==========================================
    
    // 翻页跳转
    function nextCard() {
      if (appState.currentIndex < appState.sentences.length - 1) {
        renderCard(appState.currentIndex + 1);
      }
    }

    function prevCard() {
      if (appState.currentIndex > 0) {
        renderCard(appState.currentIndex - 1);
      }
    }

    // 键盘翻页监听 [← / →]
    document.addEventListener("keydown", (e) => {
      if (appState.viewMode !== 'card') return;
      if (e.key === "ArrowLeft") {
        prevCard();
      } else if (e.key === "ArrowRight") {
        nextCard();
      }
    });

    // 视图模式切换 (Card / Flow)
    function switchViewMode(mode) {
      appState.viewMode = mode;
      
      const cardBtn = document.getElementById("btn-card-mode");
      const flowBtn = document.getElementById("btn-flow-mode");
      
      const cardContainer = document.getElementById("container-card-mode");
      const flowContainer = document.getElementById("container-flow-mode");
      const sidebar = document.getElementById("app-sidebar");

      if (mode === 'card') {
        cardBtn.classList.add("btn-active");
        flowBtn.classList.remove("btn-active");
        
        cardContainer.style.display = "flex";
        flowContainer.style.display = "none";
        sidebar.style.width = "var(--sidebar-width)";
        sidebar.style.opacity = "1";
        
        renderCard(appState.currentIndex);
      } else {
        flowBtn.classList.add("btn-active");
        cardBtn.classList.remove("btn-active");
        
        flowContainer.style.display = "block";
        cardContainer.style.display = "none";
        sidebar.style.width = "0";
        sidebar.style.opacity = "0";
      }
    }

    // 初始化系统/时间追踪及暗黑模式设置
    function initTheme() {
      // 1. 监听系统 preferences 改变
      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
          if (!localStorage.getItem('theme-preference')) {
            setTheme(e.matches ? 'dark' : 'light');
          }
        });
      }

      // 2. 获取用户手动设置覆盖
      const savedTheme = localStorage.getItem('theme-preference');
      if (savedTheme) {
        setTheme(savedTheme);
        return;
      }

      // 3. 时间与系统偏好双重自动追踪 (白天白色，晚上 18点 - 次日6点 黑色)
      const hour = new Date().getHours();
      const isNightTime = hour >= 18 || hour < 6;
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (isNightTime || prefersDark) {
        setTheme('dark');
      } else {
        setTheme('light');
      }
    }

    // 切换亮/暗视觉主题
    function toggleTheme() {
      const activeTheme = document.documentElement.getAttribute("data-theme");
      const newTheme = activeTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
      // 保存用户手动选择，覆盖自动追踪
      localStorage.setItem('theme-preference', newTheme);
    }

    function setTheme(theme) {
      appState.currentTheme = theme;
      document.documentElement.setAttribute("data-theme", theme);
      
      const themeIcon = document.getElementById("theme-icon");
      if (theme === 'dark') {
        // 暗夜状态 SVG Path
        themeIcon.innerHTML = `<path d="M12,18C11.11,18 10.26,17.8 9.5,17.45C11.56,16.5 13,14.42 13,12C13,9.58 11.56,7.5 9.5,6.55C10.26,6.2 11.11,6 12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18M20,8.69V4H15.31L12,0.69L8.69,4H4V8.69L0.69,12L4,15.31V20H8.69L12,23.31L15.31,20H20V15.31L23.31,12L20,8.69Z" />`;
      } else {
        // 白天状态 SVG Path
        themeIcon.innerHTML = `<path d="M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7M12,3.5A8.5,8.5 0 1,0 20.5,12A8.5,8.5 0 0,0 12,3.5M12,0A12,12 0 1,1 0,12A12,12 0 0,1 12,0Z" />`;
      }
    }

    // Active Recall 模糊自测模式切换
    function toggleTestMode() {
      appState.isTestMode = !appState.isTestMode;
      const testBtn = document.getElementById("btn-test-mode");
      
      if (appState.isTestMode) {
        testBtn.classList.add("btn-active");
        document.body.classList.add("test-masked");
      } else {
        testBtn.classList.remove("btn-active");
        document.body.classList.remove("test-masked");
      }
    }
  </script>
</body>
